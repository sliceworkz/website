<svg width="620" height="350" viewBox="0 0 620 350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="620" height="350" rx="8" fill="white" stroke="#E0E0E0" stroke-width="2"/>

  <g transform="translate(0, 46)">
  <!-- Timeline arrow -->
  <line x1="40" y1="170" x2="570" y2="170" stroke="#E0E0E0" stroke-width="1"/>
  <polygon points="570,167 578,170 570,173" fill="#E0E0E0"/>
  <text x="575" y="180" font-family="Inter, sans-serif" font-size="8" fill="#CCC">time</text>

  <!-- Swimlane dividers -->
  <line x1="20" y1="75" x2="570" y2="75" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="20" y1="135" x2="570" y2="135" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="20" y1="230" x2="570" y2="230" stroke="#F0F0F0" stroke-width="1"/>

  <!-- Slice 1: State Change -->
  <!-- UI Screen -->
  <rect x="55" y="35" width="50" height="34" rx="4" fill="white" stroke="#666" stroke-width="1.5"/>
  <rect x="59" y="39" width="42" height="4" rx="1" fill="#666" opacity="0.2"/>
  <rect x="59" y="47" width="30" height="3" rx="1" fill="#CCC"/>
  <rect x="59" y="53" width="36" height="3" rx="1" fill="#CCC"/>
  <rect x="59" y="59" width="18" height="5" rx="2" fill="#1890FF" opacity="0.5"/>

  <!-- Command -->
  <rect x="55" y="92" width="50" height="28" rx="3" fill="#1890FF"/>
  <line x1="63" y1="103" x2="97" y2="103" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="63" y1="110" x2="88" y2="110" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>

  <!-- Arrow down to event -->
  <line x1="80" y1="120" x2="80" y2="180" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="76,180 80,188 84,180" fill="#555"/>

  <!-- Event 1 -->
  <rect x="55" y="190" width="50" height="28" rx="3" fill="#F26522"/>
  <line x1="63" y1="201" x2="97" y2="201" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="63" y1="208" x2="88" y2="208" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>

  <!-- Slice 2 -->
  <rect x="155" y="35" width="50" height="34" rx="4" fill="white" stroke="#666" stroke-width="1.5"/>
  <rect x="159" y="39" width="42" height="4" rx="1" fill="#666" opacity="0.2"/>
  <rect x="159" y="47" width="28" height="3" rx="1" fill="#CCC"/>
  <rect x="159" y="53" width="34" height="3" rx="1" fill="#CCC"/>
  <rect x="159" y="59" width="20" height="5" rx="2" fill="#1890FF" opacity="0.5"/>

  <rect x="155" y="92" width="50" height="28" rx="3" fill="#1890FF"/>
  <line x1="163" y1="103" x2="197" y2="103" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="163" y1="110" x2="190" y2="110" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>

  <line x1="180" y1="120" x2="180" y2="180" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="176,180 180,188 184,180" fill="#555"/>

  <rect x="155" y="190" width="50" height="28" rx="3" fill="#F26522"/>
  <line x1="163" y1="201" x2="197" y2="201" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="163" y1="208" x2="190" y2="208" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>

  <!-- Event feeds into View (State Read) -->
  <line x1="180" y1="190" x2="250" y2="120" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="247,124 253,117 245,118" fill="#555"/>

  <!-- Slice 3: State Read (View) - same height as commands -->
  <rect x="240" y="92" width="55" height="28" rx="3" fill="#3DD68C"/>
  <line x1="248" y1="103" x2="287" y2="103" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="248" y1="110" x2="278" y2="110" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>

  <!-- View feeds UI -->
  <rect x="240" y="35" width="50" height="34" rx="4" fill="white" stroke="#666" stroke-width="1.5"/>
  <rect x="244" y="39" width="42" height="4" rx="1" fill="#666" opacity="0.2"/>
  <rect x="244" y="47" width="38" height="14" rx="2" fill="#3DD68C" opacity="0.15"/>
  <line x1="248" y1="52" x2="275" y2="52" stroke="#3DD68C" stroke-width="1" opacity="0.5"/>
  <line x1="248" y1="56" x2="270" y2="56" stroke="#3DD68C" stroke-width="1" opacity="0.5"/>

  <line x1="267" y1="69" x2="267" y2="92" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Slice 4: Another state change -->
  <rect x="350" y="35" width="50" height="34" rx="4" fill="white" stroke="#666" stroke-width="1.5"/>
  <rect x="354" y="39" width="42" height="4" rx="1" fill="#666" opacity="0.2"/>
  <rect x="354" y="47" width="32" height="3" rx="1" fill="#CCC"/>
  <rect x="354" y="53" width="26" height="3" rx="1" fill="#CCC"/>
  <rect x="354" y="59" width="16" height="5" rx="2" fill="#1890FF" opacity="0.5"/>

  <rect x="350" y="92" width="50" height="28" rx="3" fill="#1890FF"/>
  <line x1="358" y1="103" x2="392" y2="103" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="358" y1="110" x2="385" y2="110" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>

  <line x1="375" y1="120" x2="375" y2="180" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="371,180 375,188 379,180" fill="#555"/>

  <rect x="350" y="190" width="50" height="28" rx="3" fill="#F26522"/>
  <line x1="358" y1="201" x2="392" y2="201" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="358" y1="208" x2="385" y2="208" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>

  <!-- Automation slice -->
  <!-- Event feeds into View (between event and automation) -->
  <line x1="375" y1="190" x2="420" y2="120" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="417,124 423,117 415,118" fill="#555"/>

  <!-- Green View sticky between event and automation -->
  <rect x="410" y="92" width="55" height="28" rx="3" fill="#3DD68C"/>
  <line x1="418" y1="103" x2="457" y2="103" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="418" y1="110" x2="448" y2="110" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>

  <!-- View feeds automation gear -->
  <line x1="437" y1="92" x2="460" y2="65" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="457,68 463,62 455,63" fill="#555"/>

  <!-- Automation gear -->
  <circle cx="475" cy="52" r="16" fill="white" stroke="#666" stroke-width="1.5"/>
  <circle cx="475" cy="52" r="5" fill="#666" opacity="0.3"/>
  <path d="M475 36 L477 41 L473 41 Z" fill="#666" opacity="0.4"/>
  <path d="M475 68 L477 63 L473 63 Z" fill="#666" opacity="0.4"/>
  <path d="M459 52 L464 54 L464 50 Z" fill="#666" opacity="0.4"/>
  <path d="M491 52 L486 54 L486 50 Z" fill="#666" opacity="0.4"/>

  <!-- Automation produces command -->
  <line x1="475" y1="68" x2="520" y2="92" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="517,88 523,95 525,89" fill="#555"/>

  <rect x="510" y="92" width="50" height="28" rx="3" fill="#1890FF"/>
  <line x1="518" y1="103" x2="552" y2="103" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="518" y1="110" x2="545" y2="110" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>

  <line x1="535" y1="120" x2="535" y2="180" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="531,180 535,188 539,180" fill="#555"/>

  <rect x="510" y="190" width="50" height="28" rx="3" fill="#F26522"/>
  <line x1="518" y1="201" x2="552" y2="201" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="518" y1="208" x2="545" y2="208" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>

  <!-- Slice labels -->
  <text x="80" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#F26522" font-weight="600">State Change</text>
  <text x="180" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#F26522" font-weight="600">State Change</text>
  <text x="267" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#3DD68C" font-weight="600">State Read</text>
  <text x="375" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#F26522" font-weight="600">State Change</text>
  <text x="475" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#666" font-weight="600">Automation</text>
  </g>
</svg>
