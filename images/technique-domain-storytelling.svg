  <rect x="347" y="82" width="24" height="18" rx="9" fill="#3DD68C"/>
  <text x="359" y="95" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="white">02</text>
  <text x="359" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#666">to</text>

