<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 740" fill="none">
  <defs>
    <style>
      text { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
    <!-- Subtle glow for AI sparks -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Shadow for cards -->
    <filter id="cardShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1E1E1E" flood-opacity="0.10"/>
    </filter>
    <!-- Shadow for robot -->
    <filter id="robotShadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1E1E1E" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- ============================================================ -->
  <!-- CONVEYOR BELT                                                  -->
  <!-- ============================================================ -->

  <!-- Belt track — two parallel rails -->
  <rect x="60" y="540" width="680" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="60" y="580" width="680" height="8" rx="4" fill="#E5E7EB"/>

  <!-- Belt surface between rails -->
  <rect x="60" y="548" width="680" height="32" rx="0" fill="#F3F4F6"/>

  <!-- Tread marks on belt surface -->
  <line x1="120" y1="552" x2="120" y2="576" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="160" y1="552" x2="160" y2="576" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="552" x2="200" y2="576" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="240" y1="552" x2="240" y2="576" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="280" y1="552" x2="280" y2="576" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="320" y1="552" x2="320" y2="576" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="360" y1="552" x2="360" y2="576" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="400" y1="552" x2="400" y2="576" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="440" y1="552" x2="440" y2="576" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="480" y1="552" x2="480" y2="576" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="520" y1="552" x2="520" y2="576" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="560" y1="552" x2="560" y2="576" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="600" y1="552" x2="600" y2="576" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="640" y1="552" x2="640" y2="576" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="680" y1="552" x2="680" y2="576" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>

  <!-- Rollers beneath belt -->
  <circle cx="110" cy="608" r="16" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="2"/>
  <circle cx="110" cy="608" r="5" fill="#D1D5DB"/>
  <circle cx="250" cy="608" r="16" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="2"/>
  <circle cx="250" cy="608" r="5" fill="#D1D5DB"/>
  <circle cx="400" cy="608" r="16" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="2"/>
  <circle cx="400" cy="608" r="5" fill="#D1D5DB"/>
  <circle cx="550" cy="608" r="16" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="2"/>
  <circle cx="550" cy="608" r="5" fill="#D1D5DB"/>
  <circle cx="690" cy="608" r="16" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="2"/>
  <circle cx="690" cy="608" r="5" fill="#D1D5DB"/>

  <!-- Belt support legs -->
  <rect x="96" y="624" width="28" height="56" rx="4" fill="#E5E7EB"/>
  <rect x="236" y="624" width="28" height="56" rx="4" fill="#E5E7EB"/>
  <rect x="386" y="624" width="28" height="56" rx="4" fill="#E5E7EB"/>
  <rect x="536" y="624" width="28" height="56" rx="4" fill="#E5E7EB"/>
  <rect x="676" y="624" width="28" height="56" rx="4" fill="#E5E7EB"/>

  <!-- Ground line -->
  <line x1="40" y1="680" x2="760" y2="680" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>

  <!-- ============================================================ -->
  <!-- FLOW ARROWS on the belt                                       -->
  <!-- ============================================================ -->
  <g fill="#D1D5DB">
    <!-- Arrow 1 -->
    <polygon points="175,560 185,564 175,568"/>
    <!-- Arrow 2 -->
    <polygon points="340,560 350,564 340,568"/>
    <!-- Arrow 3 -->
    <polygon points="500,560 510,564 500,568"/>
    <!-- Arrow 4 -->
    <polygon points="640,560 650,564 640,568"/>
  </g>

  <!-- ============================================================ -->
  <!-- LEFT SIDE: EVENT MODEL BLUEPRINT                              -->
  <!-- ============================================================ -->
  <g filter="url(#cardShadow)">
    <!-- Document body -->
    <rect x="32" y="370" width="100" height="130" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
    <!-- Dog-ear fold -->
    <path d="M108 370 L132 370 L132 394 Z" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M108 370 L108 394 L132 394" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Blueprint content lines -->
    <rect x="46" y="390" width="50" height="4" rx="2" fill="#1890FF" opacity="0.5"/>
    <rect x="46" y="400" width="38" height="4" rx="2" fill="#1890FF" opacity="0.3"/>
    <!-- Mini event flow diagram -->
    <rect x="46" y="416" width="16" height="12" rx="2" fill="#F26522" opacity="0.25"/>
    <rect x="74" y="416" width="16" height="12" rx="2" fill="#3DD68C" opacity="0.25"/>
    <line x1="62" y1="422" x2="74" y2="422" stroke="#1E1E1E" stroke-width="1" opacity="0.2"/>
    <rect x="46" y="436" width="16" height="12" rx="2" fill="#1890FF" opacity="0.25"/>
    <rect x="74" y="436" width="16" height="12" rx="2" fill="#F26522" opacity="0.25"/>
    <line x1="62" y1="442" x2="74" y2="442" stroke="#1E1E1E" stroke-width="1" opacity="0.2"/>
    <rect x="46" y="456" width="16" height="12" rx="2" fill="#3DD68C" opacity="0.25"/>
    <rect x="74" y="456" width="16" height="12" rx="2" fill="#1890FF" opacity="0.25"/>
    <line x1="62" y1="462" x2="74" y2="462" stroke="#1E1E1E" stroke-width="1" opacity="0.2"/>
  </g>
  <!-- Label -->
  <text x="82" y="522" text-anchor="middle" fill="#1E1E1E" font-size="11" font-weight="600" opacity="0.55">Event Model</text>

  <!-- Arrow from blueprint to conveyor -->
  <path d="M132 460 C152 460, 148 564, 168 564" stroke="#D1D5DB" stroke-width="2" fill="none" stroke-linecap="round" marker-end="url(#arrowGray)"/>
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D1D5DB"/>
    </marker>
  </defs>

  <!-- ============================================================ -->
  <!-- VERTICAL SLICE CARD 1 — ORANGE: "Add to Cart"                -->
  <!-- ============================================================ -->
  <g filter="url(#cardShadow)">
    <rect x="188" y="360" width="120" height="180" rx="12" fill="#FFFFFF" stroke="#F26522" stroke-width="2"/>
    <!-- Color accent bar at top -->
    <rect x="188" y="360" width="120" height="36" rx="12" fill="#F26522"/>
    <rect x="188" y="380" width="120" height="16" fill="#F26522"/>
    <text x="248" y="383" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="600">Add to Cart</text>
    <!-- Stacked layers -->
    <!-- UI layer -->
    <rect x="200" y="406" width="96" height="32" rx="6" fill="#FEF3EB"/>
    <text x="248" y="419" text-anchor="middle" fill="#F26522" font-size="9" font-weight="600">UI</text>
    <rect x="210" y="424" width="30" height="4" rx="2" fill="#F26522" opacity="0.25"/>
    <rect x="244" y="424" width="20" height="4" rx="2" fill="#F26522" opacity="0.25"/>
    <!-- API layer -->
    <rect x="200" y="444" width="96" height="32" rx="6" fill="#FEF3EB"/>
    <text x="248" y="457" text-anchor="middle" fill="#F26522" font-size="9" font-weight="600">API</text>
    <rect x="210" y="462" width="40" height="4" rx="2" fill="#F26522" opacity="0.25"/>
    <!-- Data layer -->
    <rect x="200" y="482" width="96" height="32" rx="6" fill="#FEF3EB"/>
    <text x="248" y="495" text-anchor="middle" fill="#F26522" font-size="9" font-weight="600">Data</text>
    <rect x="210" y="500" width="24" height="4" rx="2" fill="#F26522" opacity="0.25"/>
    <rect x="238" y="500" width="18" height="4" rx="2" fill="#F26522" opacity="0.25"/>
    <!-- Vertical connector showing unity -->
    <line x1="206" y1="438" x2="206" y2="482" stroke="#F26522" stroke-width="2" opacity="0.2" stroke-dasharray="3,3"/>
    <line x1="290" y1="438" x2="290" y2="482" stroke="#F26522" stroke-width="2" opacity="0.2" stroke-dasharray="3,3"/>
  </g>

  <!-- ============================================================ -->
  <!-- VERTICAL SLICE CARD 2 — GREEN: "Process Payment"             -->
  <!-- ============================================================ -->
  <g filter="url(#cardShadow)">
    <rect x="348" y="340" width="120" height="200" rx="12" fill="#FFFFFF" stroke="#3DD68C" stroke-width="2"/>
    <!-- Color accent bar at top -->
    <rect x="348" y="340" width="120" height="36" rx="12" fill="#3DD68C"/>
    <rect x="348" y="360" width="120" height="16" fill="#3DD68C"/>
    <text x="408" y="363" text-anchor="middle" fill="#FFFFFF" font-size="10.5" font-weight="600">Process Payment</text>
    <!-- Stacked layers -->
    <!-- UI layer -->
    <rect x="360" y="388" width="96" height="36" rx="6" fill="#EDFBF3"/>
    <text x="408" y="403" text-anchor="middle" fill="#2AB872" font-size="9" font-weight="600">UI</text>
    <rect x="370" y="410" width="34" height="4" rx="2" fill="#3DD68C" opacity="0.25"/>
    <rect x="408" y="410" width="22" height="4" rx="2" fill="#3DD68C" opacity="0.25"/>
    <!-- Logic layer -->
    <rect x="360" y="430" width="96" height="36" rx="6" fill="#EDFBF3"/>
    <text x="408" y="445" text-anchor="middle" fill="#2AB872" font-size="9" font-weight="600">Logic</text>
    <rect x="370" y="452" width="44" height="4" rx="2" fill="#3DD68C" opacity="0.25"/>
    <!-- API layer -->
    <rect x="360" y="472" width="96" height="26" rx="6" fill="#EDFBF3"/>
    <text x="408" y="489" text-anchor="middle" fill="#2AB872" font-size="9" font-weight="600">API</text>
    <!-- Data layer -->
    <rect x="360" y="504" width="96" height="26" rx="6" fill="#EDFBF3"/>
    <text x="408" y="521" text-anchor="middle" fill="#2AB872" font-size="9" font-weight="600">Data</text>
    <!-- Vertical connector showing unity -->
    <line x1="366" y1="424" x2="366" y2="504" stroke="#3DD68C" stroke-width="2" opacity="0.2" stroke-dasharray="3,3"/>
    <line x1="450" y1="424" x2="450" y2="504" stroke="#3DD68C" stroke-width="2" opacity="0.2" stroke-dasharray="3,3"/>
  </g>

  <!-- ============================================================ -->
  <!-- VERTICAL SLICE CARD 3 — BLUE: "Send Invoice"                 -->
  <!-- ============================================================ -->
  <g filter="url(#cardShadow)">
    <rect x="508" y="370" width="120" height="170" rx="12" fill="#FFFFFF" stroke="#1890FF" stroke-width="2"/>
    <!-- Color accent bar at top -->
    <rect x="508" y="370" width="120" height="36" rx="12" fill="#1890FF"/>
    <rect x="508" y="390" width="120" height="16" fill="#1890FF"/>
    <text x="568" y="393" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="600">Send Invoice</text>
    <!-- Stacked layers -->
    <!-- Logic layer -->
    <rect x="520" y="416" width="96" height="32" rx="6" fill="#EBF5FF"/>
    <text x="568" y="429" text-anchor="middle" fill="#1478D4" font-size="9" font-weight="600">Logic</text>
    <rect x="530" y="434" width="36" height="4" rx="2" fill="#1890FF" opacity="0.25"/>
    <!-- API layer -->
    <rect x="520" y="454" width="96" height="32" rx="6" fill="#EBF5FF"/>
    <text x="568" y="467" text-anchor="middle" fill="#1478D4" font-size="9" font-weight="600">API</text>
    <rect x="530" y="472" width="44" height="4" rx="2" fill="#1890FF" opacity="0.25"/>
    <rect x="578" y="472" width="16" height="4" rx="2" fill="#1890FF" opacity="0.25"/>
    <!-- Data layer -->
    <rect x="520" y="492" width="96" height="32" rx="6" fill="#EBF5FF"/>
    <text x="568" y="505" text-anchor="middle" fill="#1478D4" font-size="9" font-weight="600">Data</text>
    <rect x="530" y="510" width="28" height="4" rx="2" fill="#1890FF" opacity="0.25"/>
    <!-- Vertical connector showing unity -->
    <line x1="526" y1="448" x2="526" y2="492" stroke="#1890FF" stroke-width="2" opacity="0.2" stroke-dasharray="3,3"/>
    <line x1="610" y1="448" x2="610" y2="492" stroke="#1890FF" stroke-width="2" opacity="0.2" stroke-dasharray="3,3"/>
  </g>

  <!-- ============================================================ -->
  <!-- RIGHT SIDE: DEPLOY / COMPLETED ICON                          -->
  <!-- ============================================================ -->
  <g filter="url(#cardShadow)">
    <!-- Circle background -->
    <circle cx="718" cy="440" r="40" fill="#EDFBF3" stroke="#3DD68C" stroke-width="2"/>
    <!-- Checkmark -->
    <polyline points="700,440 714,454 738,426" fill="none" stroke="#3DD68C" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Label -->
  <text x="718" y="498" text-anchor="middle" fill="#1E1E1E" font-size="11" font-weight="600" opacity="0.55">Deployed</text>

  <!-- Arrow from last card to deploy -->
  <path d="M628 460 C648 460, 660 440, 678 440" stroke="#D1D5DB" stroke-width="2" fill="none" stroke-linecap="round" marker-end="url(#arrowGray)"/>

  <!-- ============================================================ -->
  <!-- AI ROBOT / AGENT                                              -->
  <!-- ============================================================ -->
  <g transform="translate(370, 100)" filter="url(#robotShadow)">
    <!-- Body -->
    <rect x="-30" y="60" width="60" height="70" rx="10" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
    <!-- Body detail — screen/chest -->
    <rect x="-18" y="72" width="36" height="26" rx="4" fill="#1890FF" opacity="0.12"/>
    <!-- Chest code lines -->
    <rect x="-12" y="78" width="20" height="3" rx="1.5" fill="#1890FF" opacity="0.4"/>
    <rect x="-12" y="85" width="14" height="3" rx="1.5" fill="#F26522" opacity="0.4"/>
    <rect x="-12" y="92" width="24" height="3" rx="1.5" fill="#3DD68C" opacity="0.4"/>

    <!-- Head -->
    <rect x="-24" y="10" width="48" height="44" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="-8" cy="32" r="5" fill="#1890FF"/>
    <circle cx="-8" cy="30" r="1.5" fill="#FFFFFF"/>
    <circle cx="8" cy="32" r="5" fill="#1890FF"/>
    <circle cx="8" cy="30" r="1.5" fill="#FFFFFF"/>
    <!-- Smile -->
    <path d="M-6 40 Q0 46, 6 40" stroke="#E5E7EB" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Antenna -->
    <line x1="0" y1="10" x2="0" y2="-6" stroke="#E5E7EB" stroke-width="2.5"/>
    <circle cx="0" cy="-10" r="5" fill="#F26522"/>
    <!-- Antenna glow -->
    <circle cx="0" cy="-10" r="8" fill="#F26522" opacity="0.15" filter="url(#glow)"/>

    <!-- Left arm -->
    <line x1="-30" y1="76" x2="-48" y2="100" stroke="#E5E7EB" stroke-width="3" stroke-linecap="round"/>
    <circle cx="-50" cy="102" r="5" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>

    <!-- Right arm -->
    <line x1="30" y1="76" x2="48" y2="100" stroke="#E5E7EB" stroke-width="3" stroke-linecap="round"/>
    <circle cx="50" cy="102" r="5" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  </g>

  <!-- ============================================================ -->
  <!-- AI INTERACTION LINES — robot to slices                       -->
  <!-- ============================================================ -->

  <!-- Dashed connection from left arm to Card 1 (orange) -->
  <path d="M320 202 C290 240, 260 300, 248 358" stroke="#F26522" stroke-width="1.5" fill="none" stroke-dasharray="5,4" opacity="0.45"/>
  <!-- Small gear at midpoint -->
  <g transform="translate(284, 274)" opacity="0.45">
    <circle cx="0" cy="0" r="7" fill="none" stroke="#F26522" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="2.5" fill="#F26522"/>
    <!-- Gear teeth -->
    <line x1="0" y1="-7" x2="0" y2="-10" stroke="#F26522" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="-3.5" x2="8.5" y2="-5" stroke="#F26522" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="3.5" x2="8.5" y2="5" stroke="#F26522" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="7" x2="0" y2="10" stroke="#F26522" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="3.5" x2="-8.5" y2="5" stroke="#F26522" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="-3.5" x2="-8.5" y2="-5" stroke="#F26522" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Dashed connection from body center down to Card 2 (green) -->
  <path d="M370 230 C380 270, 400 300, 408 338" stroke="#3DD68C" stroke-width="1.5" fill="none" stroke-dasharray="5,4" opacity="0.45"/>
  <!-- Spark icon at midpoint -->
  <g transform="translate(388, 278)" opacity="0.5">
    <path d="M-4,-8 L1,-1 L-2,-1 L3,8 L-1,1 L2,1 Z" fill="#3DD68C"/>
  </g>

  <!-- Dashed connection from right arm to Card 3 (blue) -->
  <path d="M420 202 C460 240, 530 300, 568 368" stroke="#1890FF" stroke-width="1.5" fill="none" stroke-dasharray="5,4" opacity="0.45"/>
  <!-- Small gear at midpoint -->
  <g transform="translate(498, 290)" opacity="0.45">
    <circle cx="0" cy="0" r="7" fill="none" stroke="#1890FF" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="2.5" fill="#1890FF"/>
    <!-- Gear teeth -->
    <line x1="0" y1="-7" x2="0" y2="-10" stroke="#1890FF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="-3.5" x2="8.5" y2="-5" stroke="#1890FF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="3.5" x2="8.5" y2="5" stroke="#1890FF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="7" x2="0" y2="10" stroke="#1890FF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="3.5" x2="-8.5" y2="5" stroke="#1890FF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="-3.5" x2="-8.5" y2="-5" stroke="#1890FF" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- ============================================================ -->
  <!-- DECORATIVE SPARK / STAR ELEMENTS around robot                -->
  <!-- ============================================================ -->

  <!-- Spark 1 — top left -->
  <g transform="translate(310, 80)" opacity="0.35" filter="url(#glow)">
    <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z" fill="#F26522"/>
  </g>
  <!-- Spark 2 — top right -->
  <g transform="translate(450, 70)" opacity="0.3" filter="url(#glow)">
    <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="#1890FF"/>
  </g>
  <!-- Spark 3 — right -->
  <g transform="translate(470, 140)" opacity="0.25" filter="url(#glow)">
    <path d="M0,-5 L1.2,-1.2 L5,0 L1.2,1.2 L0,5 L-1.2,1.2 L-5,0 L-1.2,-1.2 Z" fill="#3DD68C"/>
  </g>
  <!-- Spark 4 — left -->
  <g transform="translate(290, 140)" opacity="0.25" filter="url(#glow)">
    <path d="M0,-5 L1.2,-1.2 L5,0 L1.2,1.2 L0,5 L-1.2,1.2 L-5,0 L-1.2,-1.2 Z" fill="#F26522"/>
  </g>

  <!-- ============================================================ -->
  <!-- LABEL: "AI-Native Software Factory" below robot              -->
  <!-- ============================================================ -->
  <text x="370" y="248" text-anchor="middle" fill="#1E1E1E" font-size="11" font-weight="600" opacity="0.4">AI Agent</text>

</svg>