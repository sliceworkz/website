<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="ai-arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1890FF"/>
    </marker>
    <marker id="ai-arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F26522"/>
    </marker>
    <marker id="ai-arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3DD68C"/>
    </marker>
    <marker id="ai-arrow-dark" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1E1E1E"/>
    </marker>
    <filter id="ai-shadow" x="-6%" y="-6%" width="112%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="ai-glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#F26522" flood-opacity="0.15"/>
    </filter>
    <filter id="ai-glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#1890FF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" ry="16" fill="#F9FAFB"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#1E1E1E">Human + AI Development Loop</text>
  <text x="400" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#9CA3AF">Collaborative cycle powered by Event Modeling</text>

  <!-- Central circle / hub -->
  <circle cx="400" cy="275" r="50" fill="white" stroke="#E5E7EB" stroke-width="2" filter="url(#ai-shadow)"/>
  <text x="400" y="270" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1E1E1E">Continuous</text>
  <text x="400" y="286" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1E1E1E">Feedback</text>

  <!-- ========== TOP: Event Model ========== -->
  <g filter="url(#ai-shadow)">
    <rect x="310" y="90" width="180" height="80" rx="12" fill="white" stroke="#3DD68C" stroke-width="2"/>
    <!-- Document icon -->
    <rect x="340" y="108" width="28" height="34" rx="3" fill="none" stroke="#3DD68C" stroke-width="2"/>
    <line x1="347" y1="118" x2="361" y2="118" stroke="#3DD68C" stroke-width="1.5"/>
    <line x1="347" y1="125" x2="361" y2="125" stroke="#3DD68C" stroke-width="1.5"/>
    <line x1="347" y1="132" x2="356" y2="132" stroke="#3DD68C" stroke-width="1.5"/>
    <polygon points="357,108 368,119 357,119" fill="#ECFDF5" stroke="#3DD68C" stroke-width="1.5"/>
    <text x="420" y="126" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1E1E1E">Event Model</text>
    <text x="420" y="145" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#3DD68C" font-weight="500">Shared blueprint</text>
  </g>

  <!-- ========== LEFT: Business Expert ========== -->
  <g filter="url(#ai-glow-blue)">
    <rect x="70" y="230" width="180" height="90" rx="12" fill="white" stroke="#1890FF" stroke-width="2"/>
    <!-- Human icon -->
    <circle cx="115" cy="258" r="12" fill="none" stroke="#1890FF" stroke-width="2"/>
    <path d="M 100 285 Q 100 272 115 272 Q 130 272 130 285" fill="none" stroke="#1890FF" stroke-width="2"/>
    <text x="185" y="268" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1E1E1E">Business</text>
    <text x="185" y="286" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1E1E1E">Expert</text>
    <text x="185" y="305" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1890FF" font-weight="500">Domain knowledge</text>
  </g>

  <!-- ========== RIGHT: AI Agent ========== -->
  <g filter="url(#ai-glow-orange)">
    <rect x="550" y="230" width="180" height="90" rx="12" fill="white" stroke="#F26522" stroke-width="2"/>
    <!-- Robot icon -->
    <rect x="582" y="253" width="26" height="22" rx="5" fill="none" stroke="#F26522" stroke-width="2"/>
    <circle cx="590" cy="263" r="3" fill="#F26522"/>
    <circle cx="602" cy="263" r="3" fill="#F26522"/>
    <line x1="595" y1="248" x2="595" y2="253" stroke="#F26522" stroke-width="2"/>
    <circle cx="595" cy="246" r="3" fill="none" stroke="#F26522" stroke-width="1.5"/>
    <line x1="580" y1="264" x2="575" y2="264" stroke="#F26522" stroke-width="2" stroke-linecap="round"/>
    <line x1="610" y1="264" x2="615" y2="264" stroke="#F26522" stroke-width="2" stroke-linecap="round"/>
    <text x="672" y="268" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1E1E1E">AI Agent</text>
    <text x="672" y="305" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#F26522" font-weight="500">Code generation</text>
  </g>

  <!-- ========== BOTTOM: Working Software ========== -->
  <g filter="url(#ai-shadow)">
    <rect x="310" y="380" width="180" height="80" rx="12" fill="white" stroke="#1E1E1E" stroke-width="2"/>
    <!-- Code icon -->
    <text x="340" y="425" font-family="Inter, sans-serif" font-size="22" fill="#1E1E1E" font-weight="300">&lt;/&gt;</text>
    <text x="432" y="418" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1E1E1E">Working</text>
    <text x="432" y="436" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1E1E1E">Software</text>
    <text x="432" y="452" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#6B7280" font-weight="500">Deployed slices</text>
  </g>

  <!-- ========== ARROWS forming the cycle ========== -->

  <!-- Top-left: Business Expert -> Event Model (blue) -->
  <path d="M 250 240 Q 280 200 310 170" fill="none" stroke="#1890FF" stroke-width="2.5" marker-end="url(#ai-arrow-blue)"/>
  <rect x="228" y="192" width="72" height="20" rx="4" fill="#EBF5FF"/>
  <text x="264" y="206" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#1890FF">Defines</text>

  <!-- Top-right: Event Model -> AI Agent (orange) -->
  <path d="M 490 170 Q 520 200 550 240" fill="none" stroke="#F26522" stroke-width="2.5" marker-end="url(#ai-arrow-orange)"/>
  <rect x="498" y="192" width="72" height="20" rx="4" fill="#FEF0E6"/>
  <text x="534" y="206" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#F26522">Instructs</text>

  <!-- Bottom-right: AI Agent -> Working Software (dark) -->
  <path d="M 550 310 Q 520 350 490 380" fill="none" stroke="#1E1E1E" stroke-width="2.5" marker-end="url(#ai-arrow-dark)"/>
  <rect x="498" y="338" width="72" height="20" rx="4" fill="#F3F4F6"/>
  <text x="534" y="352" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#1E1E1E">Generates</text>

  <!-- Bottom-left: Working Software -> Business Expert (green) -->
  <path d="M 310 380 Q 280 350 250 310" fill="none" stroke="#3DD68C" stroke-width="2.5" marker-end="url(#ai-arrow-green)"/>
  <rect x="228" y="338" width="72" height="20" rx="4" fill="#ECFDF5"/>
  <text x="264" y="352" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#3DD68C">Validates</text>

  <!-- Decorative: small iteration badge -->
  <rect x="355" y="478" width="90" height="18" rx="9" fill="#1E1E1E"/>
  <text x="400" y="491" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="white">Iterate rapidly</text>
</svg>