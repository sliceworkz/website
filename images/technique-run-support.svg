<svg width="620" height="175" viewBox="0 0 620 175" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="620" height="175" rx="8" fill="white" stroke="#E0E0E0" stroke-width="2"/>

  <!-- LEFT PANEL: Managed Services -->
  <rect x="25" y="20" width="265" height="135" rx="8" fill="white" stroke="#3DD68C" stroke-width="2"/>

  <!-- Title & subtitle -->
  <text x="157" y="82" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" fill="#1E1E1E" font-weight="700">Managed Services</text>
  <text x="157" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#3DD68C" font-weight="600">We run.</text>

  <!-- OR divider -->
  <line x1="310" y1="35" x2="310" y2="72" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="310" y="92" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#999" font-weight="600">or</text>
  <line x1="310" y1="100" x2="310" y2="140" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- RIGHT PANEL: Handover -->
  <rect x="330" y="20" width="265" height="135" rx="8" fill="white" stroke="#1890FF" stroke-width="2"/>

  <!-- Title & subtitle -->
  <text x="462" y="82" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" fill="#1E1E1E" font-weight="700">Handover</text>
  <text x="462" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1890FF" font-weight="600">You run.</text>

</svg>
